# Simple local stack for the integration project.
# All services run on one shared Docker network.
services:
  odoo-db:
    # PostgreSQL database used by Odoo.
    image: postgres:16
    container_name: odoo-db
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_password
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    networks:
      - project-network

  odoo:
    # Odoo application service.
    image: odoo:17.0
    container_name: odoo
    depends_on:
      - odoo-db
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: odoo_password
    ports:
      - "8069:8069"
    volumes:
      - odoo-data:/var/lib/odoo
    networks:
      - project-network

  wordpress-db:
    # MySQL database used by WordPress.
    image: mysql:8.0
    container_name: wordpress-db
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - wordpress-db-data:/var/lib/mysql
    networks:
      - project-network

  wordpress:
    # WordPress application service.
    image: wordpress:6.5-apache
    container_name: wordpress
    depends_on:
      - wordpress-db
    environment:
      WORDPRESS_DB_HOST: wordpress-db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress_password
      WORDPRESS_DB_NAME: wordpress
    ports:
      - "8080:80"
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - project-network

  rabbitmq:
    # RabbitMQ broker with the management UI enabled.
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - project-network

# Persistent data for databases and application files.
volumes:
  odoo-db-data:
  odoo-data:
  wordpress-db-data:
  wordpress-data:
  rabbitmq-data:

# One shared bridge network for service-to-service communication.
networks:
  project-network:
    driver: bridge
