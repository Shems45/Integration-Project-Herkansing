# Simple local stack for the integration project.
# All services run on one shared Docker network.
services:
  odoo-db:
    # PostgreSQL database used by Odoo.
    image: postgres:16
    container_name: odoo-db
    environment:
      # Keep default database as postgres; Odoo database is initialized separately.
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    # Healthcheck ensures Odoo starts only after PostgreSQL is ready.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - project-network

  odoo-init:
    # One-time init creates the real Odoo database and installs base and point_of_sale.
    image: odoo:17.0
    container_name: odoo-init
    depends_on:
      odoo-db:
        condition: service_healthy
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: odoo
    command: ["odoo", "-d", "odoo", "--addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons", "-i", "base,point_of_sale,product_sync_central_id", "--without-demo=all", "--stop-after-init"]
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo-addons:/mnt/extra-addons
    restart: "no"
    networks:
      - project-network

  odoo:
    # Odoo application service.
    image: odoo:17.0
    container_name: odoo
    # Wait for DB health and one-time init to prevent empty/broken DB startup.
    depends_on:
      odoo-db:
        condition: service_healthy
      odoo-init:
        condition: service_completed_successfully
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: odoo
    ports:
      - "8069:8069"
    command: ["odoo", "--addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons"]
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo-addons:/mnt/extra-addons
    networks:
      - project-network

  wordpress-db:
    # MySQL database used by WordPress.
    image: mysql:8.0
    container_name: wordpress-db
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: wordpress
    volumes:
      - wordpress-db-data:/var/lib/mysql
    # Healthcheck ensures WordPress starts only after MySQL is ready.
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uwordpress -pwordpress --silent"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - project-network

  wordpress:
    # WordPress application service.
    image: wordpress:6.5-apache
    container_name: wordpress
    depends_on:
      wordpress-db:
        condition: service_healthy
      wp_sender:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: wordpress-db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    ports:
      - "8080:80"
    volumes:
      - wordpress-data:/var/www/html
      - ./wordpress-plugin/product-sync:/var/www/html/wp-content/plugins/product-sync
    networks:
      - project-network

  rabbitmq:
    # RabbitMQ broker with the management UI enabled.
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - project-network

  wp_sender:
    # Receives product events from WordPress and publishes XML to RabbitMQ.
    build: ./services/wp_sender
    container_name: wp_sender
    depends_on:
      rabbitmq:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
      RABBITMQ_EXCHANGE: product.events
      RABBITMQ_QUEUE: odoo.product.events
    expose:
      - "8000"
    networks:
      - project-network

  odoo_receiver:
    # Consumes product events from RabbitMQ and updates Odoo via XML-RPC API.
    # Flow: RabbitMQ queue odoo.product.events -> parse XML -> Odoo API -> create/update/delete product
    build: ./services/odoo_receiver
    container_name: odoo_receiver
    depends_on:
      rabbitmq:
        condition: service_started
      odoo:
        condition: service_started
    environment:
      # RabbitMQ connection settings
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin
      RABBITMQ_QUEUE: odoo.product.events
      # Odoo connection settings (XML-RPC API)
      ODOO_URL: http://odoo:8069
      ODOO_DB: odoo
      ODOO_USERNAME: admin
      ODOO_PASSWORD: admin
    networks:
      - project-network

# Persistent data for databases and application files.
volumes:
  odoo-db-data:
  odoo-data:
  wordpress-db-data:
  wordpress-data:
  rabbitmq-data:

# One shared bridge network for service-to-service communication.
networks:
  project-network:
    driver: bridge
