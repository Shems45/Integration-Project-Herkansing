# Simple local stack for the integration project.
# All services run on one shared Docker network.
services:
  odoo-db:
    # PostgreSQL database used by Odoo.
    image: postgres:16
    container_name: odoo-db
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: Admin
      POSTGRES_PASSWORD: Admin
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    # Healthcheck ensures Odoo starts only after PostgreSQL is ready.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Admin -d odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - project-network

  odoo:
    # Odoo application service.
    image: odoo:17.0
    container_name: odoo
    depends_on:
      odoo-db:
        condition: service_healthy
    environment:
      HOST: odoo-db
      USER: Admin
      PASSWORD: Admin
    ports:
      - "8069:8069"
    volumes:
      - odoo-data:/var/lib/odoo
    networks:
      - project-network

  wordpress-db:
    # MySQL database used by WordPress.
    image: mysql:8.0
    container_name: wordpress-db
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: Admin
      MYSQL_PASSWORD: Admin
      MYSQL_ROOT_PASSWORD: Admin
    volumes:
      - wordpress-db-data:/var/lib/mysql
    # Healthcheck ensures WordPress starts only after MySQL is ready.
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uAdmin -pAdmin --silent"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - project-network

  wordpress:
    # WordPress application service.
    image: wordpress:6.5-apache
    container_name: wordpress
    depends_on:
      wordpress-db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: wordpress-db:3306
      WORDPRESS_DB_USER: Admin
      WORDPRESS_DB_PASSWORD: Admin
      WORDPRESS_DB_NAME: wordpress
    ports:
      - "8080:80"
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - project-network

  rabbitmq:
    # RabbitMQ broker with the management UI enabled.
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: Admin
      RABBITMQ_DEFAULT_PASS: Admin
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - project-network

# Persistent data for databases and application files.
volumes:
  odoo-db-data:
  odoo-data:
  wordpress-db-data:
  wordpress-data:
  rabbitmq-data:

# One shared bridge network for service-to-service communication.
networks:
  project-network:
    driver: bridge
